            style={{fontSize:12,padding:'6px 14px',background:filterStatus===s?'var(--surface-3)':'transparent',border:'1px solid var(--border)',color:filterStatus===s?'var(--text)':'var(--text-dim)',cursor:'pointer',borderRadius:4}}
            onClick={()=>setFilterStatus(s)}>
            {s} {s==='all'?`(${transmissions.length})`:statusCounts[s]?`(${statusCounts[s]})`:''}
          </button>
        ))}
      </div>
      {filtered.length===0 ? <div className="empty">No transmissions with status: {filterStatus}</div> : filtered.map(t=>{
        const platforms = t.scheduled_platforms || [];
        const captions = t.platform_captions || {};
        const isDistReady = ['distribution_ready','approved_for_posting','posted'].includes(t.status);
        const postIds = t.platform_post_ids || {};
        const platformIcons = {x:'fab fa-x-twitter',instagram:'fab fa-instagram',threads:'fas fa-at',linkedin:'fab fa-linkedin',facebook:'fab fa-facebook',tiktok:'fab fa-tiktok',youtube:'fab fa-youtube'};
        const allPlatforms = ['x','instagram','threads','linkedin','facebook','tiktok','youtube'];
        const baitColor = t.bait_score >= 7 ? 'var(--green)' : t.bait_score >= 5 ? 'var(--amber)' : t.bait_score ? 'var(--magenta)' : 'var(--text-muted)';
        return (
        <div key={t.id} id={`item-${t.id}`} className={`card ${updatedIds.has(t.id)?'updated':''} ${highlightId===t.id?'highlight':''}`}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
            {(()=>{
              const mediaUrl = t.blog_image_url || t.visual_url;
              const isVideo = mediaUrl && (mediaUrl.endsWith('.mp4') || mediaUrl.endsWith('.webm') || mediaUrl.endsWith('.mov'));
              if (!mediaUrl) return null;
              return React.createElement(React.Fragment, null,
                React.createElement('div', {style:{flexShrink:0,width:140,height:140,borderRadius:6,overflow:'hidden',border:'2px solid var(--border)',cursor:'pointer',position:'relative'},
                  onClick:()=>setExpandedImage(expandedImage===t.id?null:t.id)},
                  isVideo
                    ? React.createElement('video', {src:mediaUrl,muted:true,loop:true,autoPlay:true,playsInline:true,style:{width:'100%',height:'100%',objectFit:'cover'}})
                    : React.createElement('img', {src:mediaUrl,alt:t.title,style:{width:'100%',height:'100%',objectFit:'cover'}}),
                  React.createElement('div', {style:{position:'absolute',bottom:4,right:4,background:'rgba(0,0,0,0.7)',borderRadius:3,padding:'2px 6px',fontSize:11,color:'var(--cyan)'}},
                    React.createElement('i', {className: isVideo ? 'fas fa-play' : 'fas fa-expand'})),
                  isVideo && React.createElement('div', {style:{position:'absolute',top:4,left:4,background:'rgba(0,0,0,0.7)',borderRadius:3,padding:'2px 6px',fontSize:10,color:'var(--magenta)',fontWeight:700,letterSpacing:1}}, 'VIDEO')
                ),
                expandedImage===t.id && React.createElement('div', {style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.9)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'},
                  onClick:()=>setExpandedImage(null)},
                  isVideo
                    ? React.createElement('video', {src:mediaUrl,controls:true,autoPlay:true,loop:true,style:{maxWidth:'90vw',maxHeight:'90vh',borderRadius:8,border:'2px solid var(--border)'}})
                    : React.createElement('img', {src:mediaUrl,alt:t.title,style:{maxWidth:'90vw',maxHeight:'90vh',objectFit:'contain',borderRadius:8,border:'2px solid var(--border)'}}),
                  React.createElement('div', {style:{position:'absolute',top:20,right:20,fontSize:24,color:'var(--text-dim)'}},
                    React.createElement('i', {className:'fas fa-times'}))
                )
              );
            })()}
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <div className="card-title" style={{cursor:'pointer'}} onClick={()=>setExpandedId(expandedId===t.id?null:t.id)}>{t.title}</div>
                <span className="badge" style={{background:statusBg(t.status),color:statusFg(t.status)}}>{t.status}</span>
                {t.revision_count > 0 && <span className="revision-badge"><i className="fas fa-sync-alt"></i> v{t.revision_count + 1}</span>}
                {t.core_term_audit === 'passed' && <span style={{fontSize:11,color:'var(--green)',border:'1px solid var(--green)',borderRadius:4,padding:'2px 8px',letterSpacing:1,textTransform:'uppercase',fontWeight:600}}><i className="fas fa-shield-alt"></i> CT</span>}
                {t.core_term_audit !== 'passed' && <span style={{fontSize:11,color:'var(--magenta)',border:'1px solid var(--magenta)',borderRadius:4,padding:'2px 8px',letterSpacing:1,textTransform:'uppercase',fontWeight:600}}><i className="fas fa-exclamation-triangle"></i> CT</span>}
                {t.bait_score != null && <span style={{fontSize:11,color:baitColor,border:`1px solid ${baitColor}`,borderRadius:4,padding:'2px 8px',letterSpacing:1,textTransform:'uppercase',fontWeight:600}}><i className="fas fa-crosshairs"></i> BAIT {t.bait_score}/10</span>}
                {!t.bait_score && <span style={{fontSize:11,color:'var(--text-muted)',border:'1px solid var(--border)',borderRadius:4,padding:'2px 8px',letterSpacing:1,textTransform:'uppercase',fontWeight:600}}><i className="fas fa-crosshairs"></i> BAIT --</span>}
              </div>
              <div className="card-meta">{t.cultural_hook || t.template_type}</div>

              {/* Platform distribution strip */}
              <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                {allPlatforms.map(p => {
                  const isScheduled = platforms.includes(p);
                  const isActive = isScheduled || isDistReady;
                  const hasCaption = !!captions[p];
                  const isPosted = t.status === 'posted';
                  return <div key={p} title={isPosted ? `Posted to ${p}` : isActive ? `Going to ${p}` + (hasCaption ? ' (caption ready)' : '') : `${p}`}
                    style={{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:4,fontSize:13,
                      background: isPosted ? 'rgba(122,255,59,0.15)' : isActive ? 'rgba(0,240,255,0.12)' : 'var(--surface-2)',
                      border: `1px solid ${isPosted ? 'var(--green)' : isActive ? 'var(--cyan)' : 'var(--border)'}`,
                      color: isPosted ? 'var(--green)' : isActive ? 'var(--cyan)' : 'var(--text-muted)',
                      opacity: isActive ? 1 : 0.35}}>
                    <i className={platformIcons[p] || 'fas fa-globe'} style={{fontSize:12}}></i>
                    <span style={{textTransform:'uppercase',letterSpacing:1,fontSize:11,fontWeight:600}}>{p}</span>
                    {isPosted && <i className="fas fa-check" style={{fontSize:10,color:'var(--green)'}}></i>}
                    {isActive && !isPosted && <i className="fas fa-arrow-right" style={{fontSize:9,color:'var(--cyan)',opacity:0.6}}></i>}
                  </div>;
                })}
              </div>

              {t.website_published && t.website_url && (
                <div style={{marginTop:6,fontSize:12,color:'var(--green)'}}>
                  <i className="fas fa-globe"></i> Published: <a href={t.website_url} target="_blank" rel="noopener" style={{color:'var(--cyan)',textDecoration:'none'}}>{t.website_url}</a>
                </div>
              )}

              <div className={`card-body ${expandedId===t.id?'expanded':'preview'}`} onClick={()=>setExpandedId(expandedId===t.id?null:t.id)} style={{cursor:'pointer',marginTop:10}}>
                {t.body || 'No body text. Content Engine needs to write this transmission.'}
              </div>
              {t.body && t.body.length>200 && (
                <div className="expand-btn" onClick={e=>{e.stopPropagation();setExpandedId(expandedId===t.id?null:t.id);}}>
                  {expandedId===t.id ? '- show less' : '+ read full transmission'}
                </div>
              )}

              {/* Expandable platform captions */}
              {expandedId===t.id && Object.keys(captions).length > 0 && (
                <div style={{marginTop:12,padding:'12px 14px',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:4}}>
                  <strong style={{display:'block',marginBottom:8,fontSize:11,letterSpacing:1,textTransform:'uppercase',color:'var(--cyan)'}}>Platform Captions</strong>
                  {Object.entries(captions).map(([plat,cap])=>(
                    <div key={plat} style={{marginBottom:8}}>
                      <div style={{fontSize:11,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>
                        <i className={platformIcons[plat] || 'fas fa-globe'} style={{marginRight:6}}></i>{plat}
                      </div>
                      <div style={{fontSize:13,color:'var(--text)',whiteSpace:'pre-wrap',paddingLeft:20}}>{cap}</div>
                    </div>
                  ))}
                </div>
              )}

              {/* Bait audit details (expandable) */}
              {expandedId===t.id && t.bait_audit && (
                <div style={{marginTop:12,padding:'10px 14px',background: t.bait_score >= 7 ? 'rgba(122,255,59,0.06)' : 'rgba(255,51,102,0.06)',border:`1px solid ${t.bait_score >= 7 ? 'rgba(122,255,59,0.3)' : 'rgba(255,51,102,0.3)'}`,borderRadius:4,fontSize:12,color:'var(--text-dim)',whiteSpace:'pre-wrap',fontFamily:'var(--mono)'}}>
                  <strong style={{display:'block',marginBottom:4,fontSize:11,letterSpacing:1,textTransform:'uppercase',color:baitColor}}>Ego Bait Audit</strong>
                  {t.bait_audit}
                </div>
              )}

              {t.fracture_quote && <div className="quote-block"><div className="quote-text">"{t.fracture_quote}"</div><div className="quote-ref">Fracture {t.fracture_number}</div></div>}

              {t.feedback && (
                <div style={{marginTop:12,padding:'10px 14px',background:'rgba(255,184,0,0.08)',border:'1px solid rgba(255,184,0,0.3)',borderRadius:4,fontSize:13,color:'var(--amber)',whiteSpace:'pre-wrap'}}>
                  <strong style={{display:'block',marginBottom:4,fontSize:11,letterSpacing:1,textTransform:'uppercase'}}>Previous Feedback</strong>
                  {t.feedback}
                </div>
              )}

              {t.visual_model && (
                <div style={{marginTop:6,fontSize:11,color:'var(--text-muted)'}}>
                  Visual: {t.visual_model} {t.visual_credits_used ? `(${t.visual_credits_used} credits)` : ''}
                </div>
              )}

              <div className="action-buttons" style={{marginTop:14}}>
                {/* Image approved + blog published: ready for Opus workflow and manual distribution */}
                {t.blog_image_status === 'approved' && t.blog_published_url && !['posted','approved_for_posting'].includes(t.status) && (
                  <button className="btn btn-approve btn-big" onClick={()=>updateStatus('transmissions',t.id,'status','approved_for_posting')} style={{background:'linear-gradient(135deg,rgba(0,240,255,0.2),rgba(122,255,59,0.2))',border:'2px solid var(--cyan)'}}>
                    <i className="fas fa-rocket"></i> Send to All 7 Channels + The Signal
                  </button>
                )}
                {t.status === 'distribution_ready' && (
                  <>
                    <button className="btn btn-approve btn-big" onClick={()=>updateStatus('transmissions',t.id,'status','approved_for_posting')} style={{background:'linear-gradient(135deg,rgba(0,240,255,0.2),rgba(122,255,59,0.2))',border:'2px solid var(--cyan)'}}>
                      <i className="fas fa-rocket"></i> Send to All 7 Channels + The Signal
                    </button>
                    <button className="btn" style={{fontSize:14,padding:'10px 18px',background:'transparent',border:'1px solid var(--border)',color:'var(--amber)',cursor:'pointer',borderRadius:4}} onClick={()=>updateStatus('transmissions',t.id,'status','revision_needed')}><i className="fas fa-redo"></i> Redo Visual/Captions</button>
                  </>
                )}
                {!['distribution_ready','posted','approved_for_posting'].includes(t.status) && (
                  <>
                    {['draft','review','revision_needed'].includes(t.status) && (
                      <button className="btn btn-approve btn-big" onClick={()=>updateStatus('transmissions',t.id,'status','approved')}><i className="fas fa-check"></i> Approve Text</button>
                    )}
                    <button className="btn btn-reject btn-big" onClick={()=>updateStatus('transmissions',t.id,'status','rejected')}><i className="fas fa-times"></i> Kill It</button>
                    {t.status !== 'rejected' && (
                      <button className="btn" style={{fontSize:12,padding:'8px 16px',background:'transparent',border:'1px solid var(--border)',color:'var(--amber)',cursor:'pointer',borderRadius:4}} onClick={()=>updateStatus('transmissions',t.id,'status','revision_needed')}><i className="fas fa-redo"></i> Needs Revision</button>
                    )}
                  </>
                )}
              </div>

              {/* === STEP 1: THE SIGNAL IMAGE (approve image FIRST) === */}
                <div className={`video-review-section ${t.blog_image_status === 'review' ? 'needs-review' : ''}`}>
                  <div className="video-review-header">
                    <div className="video-review-title">
                      <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:24,height:24,borderRadius:'50%',background: t.blog_image_status === 'approved' ? 'var(--green)' : 'var(--surface-3)',color: t.blog_image_status === 'approved' ? '#000' : 'var(--text-dim)',fontSize:12,fontWeight:700,marginRight:4}}>1</span>
                      <i className="fas fa-image"></i> Signal Image
                    </div>
                    {t.blog_image_status && <span className="video-status-badge" style={{background:statusBg(t.blog_image_status),color:statusFg(t.blog_image_status)}}>{t.blog_image_status.replace(/_/g,' ')}</span>}
                  </div>

                  {(!t.blog_image_status || t.blog_image_status === 'none') && (
                    <div style={{padding:'16px 0',fontSize:14,color:'var(--text-muted)',fontStyle:'italic'}}>
                      <i className="fas fa-hourglass-start" style={{marginRight:8}}></i>
                      Image not yet generated. Approval watcher will create the Signal image via Nano Banana Pro.
                    </div>
                  )}

                  {t.blog_image_status === 'generating' && (
                    <div style={{padding:'16px 0',fontSize:14,color:'var(--blue)'}}>
                      <i className="fas fa-spinner fa-spin" style={{marginRight:8}}></i>
                      Generating Signal image via Nano Banana Pro...
                    </div>
                  )}

                  {t.blog_image_url && (
                    <div style={{margin:'12px 0',cursor:'pointer'}} onClick={()=>setExpandedImage(expandedImage===('sig-'+t.id)?null:('sig-'+t.id))}>
                      <img src={t.blog_image_url} alt="Signal glitch image" style={{maxWidth:280,maxHeight:280,borderRadius:6,border:'2px solid var(--border)'}} />
                      <div style={{fontSize:12,color:'var(--cyan)',marginTop:4}}><i className="fas fa-expand"></i> Click to expand</div>
                    </div>
                  )}
                  {expandedImage===('sig-'+t.id) && t.blog_image_url && (
                    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.9)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}
                      onClick={()=>setExpandedImage(null)}>
                      <img src={t.blog_image_url} alt="Signal glitch image" style={{maxWidth:'90vw',maxHeight:'90vh',objectFit:'contain',borderRadius:8,border:'2px solid var(--border)'}} />
                      <div style={{position:'absolute',top:20,right:20,fontSize:24,color:'var(--text-dim)'}}><i className="fas fa-times"></i></div>
                    </div>
                  )}

                  <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:8,alignItems:'center'}}>
                    <div style={{fontSize:14,color: t.blog_status === 'published' ? 'var(--green)' : 'var(--text-muted)'}}>
                      <i className={t.blog_status === 'published' ? 'fas fa-check-circle' : 'fas fa-circle'}></i> Signal
                      {t.blog_status && <strong style={{color:'var(--text-dim)',marginLeft:4}}>{t.blog_status}</strong>}
                      {!t.blog_status && <span style={{marginLeft:4}}>Waiting</span>}
                    </div>
                    <div style={{fontSize:14,color: t.twitter_posted ? 'var(--green)' : 'var(--text-muted)'}}>
                      <i className={t.twitter_posted ? 'fas fa-check-circle' : 'fas fa-circle'}></i> X/Twitter
                    </div>
                    <div style={{fontSize:14,color: t.threads_posted ? 'var(--green)' : 'var(--text-muted)'}}>
                      <i className={t.threads_posted ? 'fas fa-check-circle' : 'fas fa-circle'}></i> Threads
                    </div>
                  </div>
                  {t.blog_published_url && (
                    <div style={{fontSize:14,color:'var(--green)',marginBottom:8}}>
                      <i className="fas fa-globe"></i> <a href={t.blog_published_url} target="_blank" rel="noopener" style={{color:'var(--cyan)',textDecoration:'none'}}>{t.blog_published_url}</a>
                    </div>
                  )}

                  <div className="video-actions">
                    {t.blog_image_status === 'review' && (
                      <>
                        <button className="btn btn-approve" onClick={()=>updateBlogImageStatus(t.id,'approved')}><i className="fas fa-check"></i> Approve Image</button>
                        <button className="btn btn-revision" onClick={()=>updateBlogImageStatus(t.id,'revision_needed')}><i className="fas fa-redo"></i> Redo Image</button>
                      </>
                    )}
                    {t.blog_image_status === 'approved' && (
                      <div style={{fontSize:13,color:'var(--green)',fontWeight:600,letterSpacing:1,textTransform:'uppercase'}}>
                        <i className="fas fa-check-circle"></i> Image approved. Blog publishes on next hourly cycle. Grab for Opus.
                      </div>
                    )}
                  </div>
                </div>

              {/* Video pipeline deprecated 2026-04-07. Opus workflow is manual. No video gate. */}

              <FeedbackBox transmission={t} onSubmit={submitFeedback} />
            </div>
          </div>
        </div>
        );
      })}
    </div>
  );
}

function ContentQueue({ queue, updatedIds }) {
  return (
    <div className="section">
      <div className="section-title">Content Queue <span className="count">{queue.length}</span></div>
      {queue.length===0 ? <div className="empty">No content queued. Approve transmissions to populate this pipeline.</div> : (
        <table><thead><tr><th>Platform</th><th>Type</th><th>Scheduled</th><th>Status</th></tr></thead>
          <tbody>{queue.map(c=>(
            <tr key={c.id} className={updatedIds.has(c.id)?'row-flash':''}>
              <td style={{fontWeight:600}}>{c.platform}</td><td>{c.content_type}</td>
              <td style={{color:'var(--text-dim)'}}>{c.scheduled_time?new Date(c.scheduled_time).toLocaleString():'-'}</td>
              <td><span className="badge" style={{background:statusBg(c.status),color:statusFg(c.status)}}>{c.status}</span></td>
            </tr>
          ))}</tbody></table>
      )}
    </div>
  );
}

function PackagesTab({ packages, updateStatus, updatedIds }) {
  return (
    <div className="section">
      <div className="section-title">Black Box Packages <span className="count">{packages.length}</span></div>
      {packages.length===0 ? <div className="empty">No packages yet</div> : (
        <table><thead><tr><th>Target</th><th>Address</th><th>Edition</th><th>Status</th><th>Tracking</th><th>Notes</th></tr></thead>
          <tbody>{packages.map(p=>(
            <tr key={p.id} className={updatedIds.has(p.id)?'row-flash':''}>
              <td style={{fontWeight:600}}>{p.target_name}</td>
              <td style={{fontSize:14,color:'var(--text-dim)',maxWidth:220}}>{p.mailing_address}</td>
              <td>{p.edition}</td>
              <td>
                <StatusBadge status={p.status} table="black_box_packages" id={p.id} field="status"
                  options={['pending','ordered','packaging','shipped','delivered','confirmed']} onChange={updateStatus} />
              </td>
              <td style={{fontSize:14}}>{p.tracking_number||'-'}</td>
              <td className="notes-cell">{p.notes}</td>
            </tr>
          ))}</tbody></table>
      )}
    </div>
  );
}

function KeyDates({ dates, updatedIds }) {
  return (
    <div className="section">
      <div className="section-title">Key Dates <span className="count">{dates.length}</span></div>
      {dates.length===0 ? <div className="empty">No key dates yet</div> : (
        <table><thead><tr><th>Date</th><th>Title</th><th>Category</th><th>Status</th><th>Description</th></tr></thead>
          <tbody>{dates.map(d=>(
            <tr key={d.id} className={updatedIds.has(d.id)?'row-flash':''}>
              <td style={{whiteSpace:'nowrap',color:'var(--cyan)',fontWeight:600,fontSize:14}}>
                {new Date(d.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
              </td>
              <td style={{fontWeight:600}}>{d.title}</td>
              <td style={{fontSize:14,color:'var(--text-muted)'}}>{d.category}</td>
              <td><span className="badge" style={{background:statusBg(d.status),color:statusFg(d.status)}}>{d.status}</span></td>
              <td className="notes-cell">{d.description}</td>
            </tr>
          ))}</tbody></table>
      )}
    </div>
  );
}

function ApprovalsTab({ transmissions, updateStatus, updatedIds, highlightId, submitFeedback }) {
  const [expandedId, setExpandedId] = useState(null);
  const pendingReview = transmissions.filter(t=>t.status==='review');
  const needsRevision = transmissions.filter(t=>t.status==='revision_needed');
  const approved = transmissions.filter(t=>t.status==='approved');

  const TransmissionCard = ({ t, statusLabel, accentColor }) => {
    const baitColor = t.bait_score >= 7 ? 'var(--green)' : t.bait_score >= 5 ? 'var(--amber)' : t.bait_score ? 'var(--magenta)' : 'var(--text-muted)';
    return (
      <div key={t.id} id={`item-${t.id}`} className={`card ${updatedIds.has(t.id)?'updated':''} ${highlightId===t.id?'highlight':''}`} style={accentColor?{borderLeftColor:accentColor,borderLeftWidth:3}:{}}>
        <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
          {(t.visual_url || t.blog_image_url) && (
            <div style={{flexShrink:0,width:120,height:120,borderRadius:6,overflow:'hidden',border:'2px solid var(--border)'}}>
              <img src={t.visual_url || t.blog_image_url} alt={t.title} style={{width:'100%',height:'100%',objectFit:'cover'}} />
            </div>
          )}
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8,flexWrap:'wrap'}}>
              <div className="card-title">{t.title}</div>
              <span className="badge" style={{background:statusBg(t.status),color:statusFg(t.status)}}>{statusLabel}</span>
              {t.revision_count > 0 && <span className="revision-badge"><i className="fas fa-sync-alt"></i> v{t.revision_count + 1}</span>}
              {t.track && <span className={`inline-track ${t.track.toUpperCase()==='A'?'inline-track-a':'inline-track-b'}`}>{t.track.toUpperCase()}</span>}
              {t.origin && <span className={`inline-origin ${t.origin==='managed_agent'?'inline-origin-managed':'inline-origin-engine'}`}>{t.origin==='managed_agent'?'MANAGED':'ENGINE'}</span>}
              {t.core_term_audit === 'passed' && <span style={{fontSize:11,color:'var(--green)',border:'1px solid var(--green)',borderRadius:4,padding:'2px 8px',letterSpacing:1,textTransform:'uppercase',fontWeight:600}}><i className="fas fa-shield-alt"></i> CT</span>}
              {t.bait_score != null && <span style={{fontSize:11,color:baitColor,border:`1px solid ${baitColor}`,borderRadius:4,padding:'2px 8px',letterSpacing:1,textTransform:'uppercase',fontWeight:600}}><i className="fas fa-crosshairs"></i> BAIT {t.bait_score}/10</span>}
            </div>
            <div className="card-meta">{t.cultural_hook}</div>
            {t.feedback && t.status==='revision_needed' && (
              <div style={{marginTop:10,padding:'8px 12px',background:'rgba(255,160,0,0.08)',border:'1px solid rgba(255,160,0,0.3)',borderRadius:4,fontSize:12,color:'var(--amber)',whiteSpace:'pre-wrap'}}>
                <strong style={{display:'block',marginBottom:4,fontSize:11,letterSpacing:1,textTransform:'uppercase'}}>Feedback Queued for Agent</strong>
                {t.feedback}
              </div>
            )}
            <div className={`card-body ${expandedId===t.id?'expanded':'preview'}`} style={{marginTop:12}}>
              {t.body || 'No body text.'}
            </div>
            {t.body && t.body.length>200 && (
              <div className="expand-btn" onClick={()=>setExpandedId(expandedId===t.id?null:t.id)}>
                {expandedId===t.id ? '- show less' : '+ read full transmission'}
              </div>
            )}
            {expandedId===t.id && t.bait_audit && (
              <div style={{marginTop:12,padding:'10px 14px',background: t.bait_score >= 7 ? 'rgba(122,255,59,0.06)' : 'rgba(255,51,102,0.06)',border:`1px solid ${t.bait_score >= 7 ? 'rgba(122,255,59,0.3)' : 'rgba(255,51,102,0.3)'}`,borderRadius:4,fontSize:12,color:'var(--text-dim)',whiteSpace:'pre-wrap',fontFamily:'var(--mono)'}}>
                <strong style={{display:'block',marginBottom:4,fontSize:11,letterSpacing:1,textTransform:'uppercase',color:baitColor}}>Ego Bait Audit</strong>
                {t.bait_audit}
              </div>
            )}
            {t.fracture_quote && <div className="quote-block"><div className="quote-text">"{t.fracture_quote}"</div><div className="quote-ref">Fracture {t.fracture_number}</div></div>}
            <div className="card-actions">
              <button className="btn btn-approve" onClick={()=>updateStatus('transmissions',t.id,'status','approved')}><i className="fas fa-check"></i> Approve</button>
              <button className="btn btn-reject" onClick={()=>updateStatus('transmissions',t.id,'status','rejected')}><i className="fas fa-times"></i> Kill It</button>
              {t.status !== 'revision_needed' && (
                <button className="btn" style={{fontSize:12,padding:'6px 14px',background:'transparent',border:'1px solid var(--border)',color:'var(--amber)',cursor:'pointer',borderRadius:4}} onClick={()=>updateStatus('transmissions',t.id,'status','revision_needed')}><i className="fas fa-redo"></i> Revision</button>
              )}
            </div>
            <FeedbackBox transmission={t} onSubmit={submitFeedback} />
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      {needsRevision.length > 0 && (
        <div className="section">
          <div className="section-title" style={{color:'var(--amber)'}}><i className="fas fa-redo" style={{marginRight:8}}></i>Needs Revision <span className="count">{needsRevision.length}</span></div>
          <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:12}}>Feedback submitted. Agent will redraft. You can approve as-is or add more feedback.</div>
          {needsRevision.map(t => <TransmissionCard key={t.id} t={t} statusLabel="revision needed" accentColor="var(--amber)" />)}
        </div>
      )}
      <div className="section">
        <div className="section-title">Pending Approval <span className="count">{pendingReview.length}</span></div>
        {pendingReview.length===0 ? <div className="empty">Nothing pending approval</div> : pendingReview.map(t => <TransmissionCard key={t.id} t={t} statusLabel="review" accentColor={null} />)}
      </div>
      <div className="section">
        <div className="section-title">Approved <span className="count">{approved.length}</span></div>
        {approved.length===0 ? <div className="empty">No approved transmissions yet</div> : approved.map(t=>(
          <div key={t.id} className={`card ${updatedIds.has(t.id)?'updated':''}`} style={{borderLeftColor:'var(--green)',borderLeftWidth:3}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div className="card-title">{t.title}</div>
              <span className="badge" style={{background:statusBg('approved'),color:statusFg('approved')}}>Approved</span>
            </div>
            <div className="card-meta">{t.cultural_hook}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<LoginGate><App /></LoginGate>, document.getElementById('root'));
</script>
</body>
</html>
